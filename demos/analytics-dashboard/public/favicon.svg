<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#18181b"/>

  <!-- Bars (purple, varying heights) -->
  <rect x="4"  y="20" width="5" height="8"  rx="1.5" fill="#8b5cf6" opacity="0.55"/>
  <rect x="11" y="14" width="5" height="14" rx="1.5" fill="#8b5cf6" opacity="0.75"/>
  <rect x="18" y="17" width="5" height="11" rx="1.5" fill="#8b5cf6" opacity="0.65"/>
  <rect x="25" y="9"  width="5" height="19" rx="1.5" fill="#8b5cf6"/>

  <!-- Area fill under trend line -->
  <polygon
    points="6.5,19 13.5,13 20.5,16 27.5,8 27.5,28 6.5,28"
    fill="#f97316"
    opacity="0.12"
  />

  <!-- Trend line (orange) -->
  <polyline
    points="6.5,19 13.5,13 20.5,16 27.5,8"
    stroke="#f97316"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dots on trend line -->
  <circle cx="6.5"  cy="19" r="1.5" fill="#f97316"/>
  <circle cx="13.5" cy="13" r="1.5" fill="#f97316"/>
  <circle cx="20.5" cy="16" r="1.5" fill="#f97316"/>
  <circle cx="27.5" cy="8"  r="1.5" fill="#f97316"/>
</svg>
