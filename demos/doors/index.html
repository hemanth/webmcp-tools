<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Mystery Doors - Hallway</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            text-align: center;
        }

        .doors-container {
            display: flex;
            gap: 40px;
        }

        button {
            width: 120px;
            height: 200px;
            border-radius: 4px;
            cursor: pointer;
            transition:
                transform 0.2s,
                box-shadow 0.2s;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4em;
            color: rgba(255, 255, 255, 0.4);
            border-width: 10px;
            border-style: solid;
            position: relative;
        }

        button::after {
            content: '';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            color: rgba(255, 255, 255, 0.8);
        }

        .doors-container form:nth-child(1) button {
            background: repeating-linear-gradient(90deg, #8b5a2b, #8b5a2b 10px, #7a4e25 11px);
            border-color: #5d3a1a;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .doors-container form:nth-child(2) button {
            background: repeating-linear-gradient(90deg, #5d2a1a, #5d2a1a 10px, #4a2115 11px);
            border-color: #3d1b11;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .doors-container form:nth-child(3) button {
            background: repeating-linear-gradient(90deg, #3d2b1f, #3d2b1f 10px, #2a1d15 11px);
            border-color: #1a120d;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>
    <div>
        <h1>Choose a Door</h1>
        <div class="doors-container">
            <form action="forest.html" toolautosubmit toolname="openDoor1"
                tooldescription="Open the first mystery door. Only one door can be chosen.">
                <button>1</button>
            </form>
            <form action="ocean.html" toolautosubmit toolname="openDoor2"
                tooldescription="Open the second mystery door. Only one door can be chosen.">
                <button>2</button>
            </form>
            <form action="magic.html" toolautosubmit toolname="openDoor3"
                tooldescription="Open the third mystery door. Only one door can be chosen.">
                <button>3</button>
            </form>
        </div>
    </div>
</body>

</html>
