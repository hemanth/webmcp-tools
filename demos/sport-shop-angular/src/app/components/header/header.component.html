<header class="glass sticky top-0 z-50 shadow-premium">
    <nav class="flex justify-between items-center w-full px-8 max-w-[1440px] mx-auto h-20">
        <a routerLink="/"
            class="text-2xl font-black italic tracking-tighter text-on-surface uppercase cursor-pointer focus:outline-none block">WEBMCP
            SPORTS</a>
        <div class="flex items-center gap-6">
            <div class="hidden lg:flex items-center bg-surface-container-low px-4 py-2 rounded-lg group focus-within:ring-2 ring-primary/20 transition-all">
                <span class="material-symbols-outlined text-on-surface-variant mr-2">search</span>
                <input #searchInput (keyup.enter)="onSearch(searchInput.value)" class="bg-transparent border-none focus:ring-0 text-sm font-medium w-48 text-on-surface" type="text" placeholder="Search products..."/>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative" (click)="toggleCart()">
                    <span class="material-symbols-outlined text-on-surface cursor-pointer">shopping_cart</span>
                    @if (cartService.cartCount() > 0) {
                        <span class="absolute -top-2 -right-2 bg-primary text-on-primary text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center pointer-events-none">
                            {{ cartService.cartCount() }}
                        </span>
                    }
                </div>
            </div>
        </div>
    </nav>
</header>
